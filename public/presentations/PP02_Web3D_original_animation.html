<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PP02 Web3D | 原始 PPT 動畫參考</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050607;
      --panel: #111417;
      --ink: #f5f7f8;
      --muted: #aab5bb;
      --line: #30383e;
      --accent: #d56a46;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", "Noto Sans TC", Arial, sans-serif;
    }

    body {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
      padding: 18px;
    }

    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 18px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 3vw, 42px);
      letter-spacing: 0;
      line-height: 1.12;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .stage {
      display: grid;
      place-items: center;
      min-height: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      overflow: hidden;
    }

    video {
      display: block;
      width: 100%;
      height: 100%;
      max-height: calc(100vh - 120px);
      object-fit: contain;
      background: #000;
    }

    @media (max-width: 720px) {
      body {
        padding: 10px;
      }

      header {
        display: block;
      }

      p {
        margin-top: 8px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>PP02 原始 PPT 動畫參考</h1>
    <p>由 PowerPoint 匯出的 MP4，用來比對物件淡入、淡出與投影片切換節奏。</p>
  </header>
  <main class="stage">
    <video src="../PP02_Web3D_original_animation.mp4" controls playsinline></video>
  </main>
</body>
</html>

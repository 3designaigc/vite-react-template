<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIGC.4DBIM | 包浩斯 3D 空間藝術</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f4f2;
      --ink: #111111;
      --bh-red: #d62828;
      --bh-blue: #003049;
      --bh-yellow: #fcbf49;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(0, 48, 73, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 48, 73, 0.03) 1px, transparent 1px);
      background-size: 20px 20px;
      font-family: 'Noto Sans TC', sans-serif;
      user-select: none;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
      cursor: grab;
    }

    #canvas-container:active {
      cursor: grabbing;
    }

    /* Bauhaus UI Overlays */
    .bh-overlay {
      position: absolute;
      inset: 0;
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      pointer-events: none;
      z-index: 10;
    }

    .top-left {
      border-left: 6px solid var(--bh-red);
      padding-left: 14px;
    }

    .kicker {
      color: var(--bh-red);
      font-family: 'Oswald', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    h1 {
      margin: 0;
      font-family: 'Oswald', sans-serif;
      font-size: 38px;
      font-weight: 700;
      line-height: 1.05;
      color: var(--ink);
      text-transform: uppercase;
      letter-spacing: -0.01em;
    }

    .subtitle {
      margin: 6px 0 0;
      font-size: 12px;
      font-weight: 700;
      color: #555;
      letter-spacing: 0.05em;
    }

    .bottom-right {
      align-self: flex-end;
      text-align: right;
      border-right: 6px solid var(--bh-blue);
      padding-right: 14px;
    }

    .motto {
      font-family: 'Oswald', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      line-height: 1.2;
    }

    .concept {
      margin-top: 4px;
      font-size: 11px;
      font-weight: 700;
      color: #666;
      letter-spacing: 0.08em;
    }

    .interactive-tip {
      position: absolute;
      bottom: 30px;
      left: 30px;
      font-family: 'Oswald', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: #888;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tip-dot {
      width: 8px;
      height: 8px;
      background-color: var(--bh-yellow);
      border-radius: 50%;
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(0.9); opacity: 0.6; }
      50% { transform: scale(1.3); opacity: 1; }
      100% { transform: scale(0.9); opacity: 0.6; }
    }

    /* Color indicators */
    .color-tags {
      position: absolute;
      top: 30px;
      right: 30px;
      display: flex;
      gap: 12px;
      pointer-events: auto; /* Clickable over overlay */
      z-index: 30;
    }

    .tag {
      width: 24px;
      height: 24px;
      border: 2px solid var(--ink);
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .tag:hover {
      transform: scale(1.15);
    }
    .tag-red { background: var(--bh-red); border-radius: 50%; }
    .tag-blue { background: var(--bh-blue); }
    .tag-yellow {
      background: var(--bh-yellow);
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
      border: none;
      width: 26px;
      height: 26px;
    }
    .tag-orange-diamond {
      background: #e67e22; /* Orange */
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      border: none;
      width: 26px;
      height: 26px;
    }

    /* Bauhaus Floating Painting Cards */
    .painting-card {
      position: absolute;
      top: 180px;
      left: 30px;
      width: 250px;
      background: #fff;
      border: 3px solid var(--ink);
      box-shadow: 6px 6px 0px var(--ink);
      z-index: 25;
      display: none;
      flex-direction: column;
      pointer-events: auto;
    }
    .painting-card.is-active {
      display: flex;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      border-bottom: 3px solid var(--ink);
      padding: 6px 12px;
    }
    .card-title {
      font-family: 'Oswald', 'Noto Sans TC', sans-serif;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .card-close {
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      border: none;
      background: transparent;
      padding: 0;
      margin: 0;
      color: var(--ink);
      font-family: inherit;
    }
    .card-close:hover {
      color: var(--bh-red);
    }
    .card-body {
      padding: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #fff;
    }
    .card-body img {
      max-width: 100%;
      max-height: 180px;
      object-fit: contain;
      border: 2px solid var(--ink);
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div class="bh-overlay">
    <div class="top-left">
      <div class="kicker">AIGC.4DBIM Exhibition</div>
      <h1>Suprematist Physics</h1>
      <p class="subtitle">4D 慢速磁力碰撞空間：去穿插、滑鼠 3D 磁力排斥與緩慢漂移</p>
    </div>

    <div class="color-tags">
      <div class="tag tag-red" title="切換至 動畫 A (靜態)"></div>
      <div class="tag tag-blue" title="切換至 動畫 B (動態)"></div>
      <div class="tag tag-yellow" title="開啟/關閉 原始畫作 A"></div>
      <div class="tag tag-orange-diamond" title="開啟/關閉 原始畫作 B"></div>
    </div>

    <!-- Floating Painting Cards -->
    <div id="painting-card-a" class="painting-card">
      <div class="card-header">
        <span class="card-title">原始畫作 A</span>
        <button class="card-close" onclick="toggleCard('a', false)">✕</button>
      </div>
      <div class="card-body">
        <img src="HTML/img/A.jpg" alt="Original Artwork A">
      </div>
    </div>

    <div id="painting-card-b" class="painting-card">
      <div class="card-header">
        <span class="card-title">原始畫作 B</span>
        <button class="card-close" onclick="toggleCard('b', false)">✕</button>
      </div>
      <div class="card-body">
        <img src="HTML/img/B.jpg" alt="Original Artwork B">
      </div>
    </div>

    <div class="interactive-tip">
      <span class="tip-dot"></span>
      <span>晃動滑鼠或觸控以產生 3D 磁場 ── 可推撥形體</span>
    </div>

    <div class="bottom-right">
      <div class="motto">Slow Motion & Parallax</div>
      <p class="concept">磁力交互 ── 緩慢、無穿插的動態，滑鼠可引導漂浮路徑</p>
    </div>
  </div>

  <!-- Three.js Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = null; 

    // Setup Perspective Camera
    const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 100);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Clean soft shadows
    container.appendChild(renderer.domElement);

    // Group to hold all volumetric elements
    const artGroup = new THREE.Group();
    scene.add(artGroup);

    // Bauhaus Colors
    const colors = {
      red: 0xd62828,
      blue: 0x003049,
      yellow: 0xfcbf49,
      ink: 0x111111,
      mutedRed: 0xb03a2e,
      greyBlue: 0x2e4053,
      paper: 0xf4f4f2
    };

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.65);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
    dirLight.position.set(8, 14, 12);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 30;
    dirLight.shadow.camera.left = -7;
    dirLight.shadow.camera.right = 7;
    dirLight.shadow.camera.top = 7;
    dirLight.shadow.camera.bottom = -7;
    dirLight.shadow.bias = -0.0003;
    scene.add(dirLight);

    // Helper to create solid meshes with outline borders
    function createVolumetricMesh(geometry, faceColor) {
      const material = new THREE.MeshPhongMaterial({
        color: faceColor,
        flatShading: false,
        shininess: 45,
        specular: 0x333333
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.castShadow = true;
      mesh.receiveShadow = true;

      // Add outline borders
      const edges = new THREE.EdgesGeometry(geometry, 25);
      const lineMaterial = new THREE.LineBasicMaterial({
        color: colors.ink,
        linewidth: 2
      });
      const outline = new THREE.LineSegments(edges, lineMaterial);
      mesh.add(outline);

      return mesh;
    }

    // --- RECREATING THE SCULPTURE WITH HIGH VOLUMETRIC SOLIDS ---
    // Accurate sizes, masses, and generous radii to prevent mesh interpenetration.

    // 1. Central Black Beam (Thick長方體)
    const mainBeamGeo = new THREE.BoxGeometry(1.6, 9.0, 1.6);
    const mainBeam = createVolumetricMesh(mainBeamGeo, colors.ink);
    artGroup.add(mainBeam);

    // 2. Red Block (Thick長方體)
    const redPlaneGeo = new THREE.BoxGeometry(3.6, 4.0, 2.0);
    const redPlane = createVolumetricMesh(redPlaneGeo, colors.red);
    artGroup.add(redPlane);

    // 3. Blue Cube (Perfect正方體)
    const bluePlaneGeo = new THREE.BoxGeometry(3.0, 3.0, 3.0);
    const bluePlane = createVolumetricMesh(bluePlaneGeo, colors.blue);
    artGroup.add(bluePlane);

    // 4. Black Sphere (圓球體 representing the circle)
    const sphereGeo = new THREE.SphereGeometry(0.65, 32, 32);
    const blackSphere = createVolumetricMesh(sphereGeo, colors.ink);
    artGroup.add(blackSphere);

    // 5. Horizontal Black Crossing Bar (Thick長方體)
    const crossBarGeo = new THREE.BoxGeometry(0.6, 2.4, 0.6);
    const crossBar = createVolumetricMesh(crossBarGeo, colors.ink);
    artGroup.add(crossBar);

    // 6. Top Black Line Array (Thick圓柱體 - Cylinders)
    const rodGeo1 = new THREE.CylinderGeometry(0.12, 0.12, 3.4, 16);
    const topRod1 = createVolumetricMesh(rodGeo1, colors.ink);
    artGroup.add(topRod1);

    const rodGeo2 = new THREE.CylinderGeometry(0.08, 0.08, 2.6, 16); 
    const topRod2 = createVolumetricMesh(rodGeo2, colors.ink);
    artGroup.add(topRod2);

    // Top Red/Brown Rod (Cylinder)
    const topRodRed = createVolumetricMesh(rodGeo2, colors.mutedRed);
    artGroup.add(topRodRed);

    // 7. Right Vertical Red Rod (Cylinder)
    const rightRodGeo = new THREE.CylinderGeometry(0.1, 0.1, 2.8, 16);
    const rightRod = createVolumetricMesh(rightRodGeo, colors.red);
    artGroup.add(rightRod);

    // 8. Bottom-Left Crossing Rods (Cylinders)
    const botRodBlueGeo = new THREE.CylinderGeometry(0.12, 0.12, 3.8, 16);
    const botRodBlue = createVolumetricMesh(botRodBlueGeo, colors.greyBlue);
    artGroup.add(botRodBlue);

    const botRodRedGeo = new THREE.CylinderGeometry(0.1, 0.1, 3.0, 16);
    const botRodRed = createVolumetricMesh(botRodRedGeo, colors.mutedRed);
    artGroup.add(botRodRed);

    // 9. Bottom-Right Red Triangular Prism / Cone
    const triangleGeo = new THREE.ConeGeometry(0.7, 2.4, 3);
    const triangle = createVolumetricMesh(triangleGeo, colors.red);
    artGroup.add(triangle);

    // 10. Bottom-Right Black Bar (長方體)
    const rightBotBarGeo = new THREE.BoxGeometry(0.4, 1.6, 0.4);
    const rightBotBar = createVolumetricMesh(rightBotBarGeo, colors.ink);
    artGroup.add(rightBotBar);

    // 11. Floor Shadow Receiver
    const shadowFloorGeo = new THREE.PlaneGeometry(40, 40);
    const shadowFloorMat = new THREE.ShadowMaterial({ opacity: 0.12 });
    const shadowFloor = new THREE.Mesh(shadowFloorGeo, shadowFloorMat);
    shadowFloor.rotation.x = -Math.PI / 2;
    shadowFloor.position.y = -5.5;
    shadowFloor.receiveShadow = true;
    scene.add(shadowFloor);

    // --- PHYSICS OBJECTS DATA STRUCTURE ---
    const physicsObjects = [
      {
        mesh: mainBeam, radius: 2.3, mass: 5.0,
        defaultPos: new THREE.Vector3(0.25, 0.1, 1.2),
        defaultRot: new THREE.Euler(0, 0, -0.46),
        pos: new THREE.Vector3(), vel: new THREE.Vector3(), rotVel: new THREE.Vector3()
      },
      {
        mesh: redPlane, radius: 2.4, mass: 4.0,
        defaultPos: new THREE.Vector3(0.1, 0.4, -1.2),
        defaultRot: new THREE.Euler(0, 0, 0.22),
        pos: new THREE.Vector3(), vel: new THREE.Vector3(), rotVel: new THREE.Vector3()
      },
      {
        mesh: bluePlane, radius: 2.2, mass: 6.0,
        defaultPos: new THREE.Vector3(-0.6, 0.6, -4.0),
        defaultRot: new THREE.Euler(0, 0, -0.42),
        pos: new THREE.Vector3(), vel: new THREE.Vector3(), rotVel: new THREE.Vector3()
      },
      {
        mesh: blackSphere, radius: 0.72, mass: 1.5,
        defaultPos: new THREE.Vector3(-0.8, 2.9, 0.3),
        defaultRot: new THREE.Euler(0, 0, 0),
        pos: new THREE.Vector3(), vel: new THREE.Vector3(), rotVel: new THREE.Vector3()
      },
      {
        mesh: crossBar, radius: 1.15, mass: 1.8,
        defaultPos: new THREE.Vector3(1.7, 0.3, 1.8),
        defaultRot: new THREE.Euler(0, 0, -1.42),
        pos: new THREE.Vector3(), vel: new THREE.Vector3(), rotVel: new THREE.Vector3()
      },
      {
        mesh: topRod1, radius: 1.15, mass: 1.2,
        defaultPos: new THREE.Vector3(-0.4, 4.3, 0.6),
        defaultRot: new THREE.Euler(0, 0, 1.15),
        pos: new THREE.Vector3(), vel: new THREE.Vector3(), rotVel: new THREE.Vector3()
      },
      {
        mesh: topRod2, radius: 0.95, mass: 0.8,
        defaultPos: new THREE.Vector3(-0.1, 4.5, 1.0),
        defaultRot: new THREE.Euler(0, 0, 1.15),
        pos: new THREE.Vector3(), vel: new THREE.Vector3(), rotVel: new THREE.Vector3()
      },
      {
        mesh: topRodRed, radius: 0.95, mass: 0.8,
        defaultPos: new THREE.Vector3(-0.25, 4.45, 1.3),
        defaultRot: new THREE.Euler(0, 0, 1.15),
        pos: new THREE.Vector3(), vel: new THREE.Vector3(), rotVel: new THREE.Vector3()
      },
      {
        mesh: rightRod, radius: 1.05, mass: 1.0,
        defaultPos: new THREE.Vector3(1.4, 2.3, -0.6),
        defaultRot: new THREE.Euler(0, 0, -0.28),
        pos: new THREE.Vector3(), vel: new THREE.Vector3(), rotVel: new THREE.Vector3()
      },
      {
        mesh: botRodBlue, radius: 1.35, mass: 1.4,
        defaultPos: new THREE.Vector3(-0.9, -2.5, -0.2),
        defaultRot: new THREE.Euler(0, 0, 1.1),
        pos: new THREE.Vector3(), vel: new THREE.Vector3(), rotVel: new THREE.Vector3()
      },
      {
        mesh: botRodRed, radius: 1.15, mass: 1.0,
        defaultPos: new THREE.Vector3(-0.6, -2.3, -2.2),
        defaultRot: new THREE.Euler(0, 0, -0.4),
        pos: new THREE.Vector3(), vel: new THREE.Vector3(), rotVel: new THREE.Vector3()
      },
      {
        mesh: triangle, radius: 1.15, mass: 1.6,
        defaultPos: new THREE.Vector3(2.8, -2.3, -0.4),
        defaultRot: new THREE.Euler(0.2, 0.6, -0.15),
        pos: new THREE.Vector3(), vel: new THREE.Vector3(), rotVel: new THREE.Vector3()
      },
      {
        mesh: rightBotBar, radius: 0.9, mass: 1.0,
        defaultPos: new THREE.Vector3(2.7, -3.1, -1.0),
        defaultRot: new THREE.Euler(0, 0, 0.15),
        pos: new THREE.Vector3(), vel: new THREE.Vector3(), rotVel: new THREE.Vector3()
      }
    ];

    physicsObjects.forEach(obj => {
      obj.pos.copy(obj.defaultPos);
      obj.mesh.position.copy(obj.pos);
      obj.mesh.rotation.copy(obj.defaultRot);
    });

    // Initialize neighbor list for safety distance checks
    physicsObjects.forEach((objA, i) => {
      objA.neighbors = [];
      physicsObjects.forEach((objB, j) => {
        if (i !== j) {
          const dist = objA.defaultPos.distanceTo(objB.defaultPos);
          if (dist < 4.0) { // Check neighbors within 4.0 units
            objA.neighbors.push({
              index: j,
              minDist: dist - 0.15 // allow getting closer by at most 0.15 units
            });
          }
        }
      });
    });

    // --- SEAMLESS 360 ORBIT CAMERA ---
    const cameraState = {
      radius: 13.5,
      theta: 0,
      phi: Math.PI / 2.0,
      lookAt: new THREE.Vector3(0, 0, 0),
      targetLookAt: new THREE.Vector3(0, 0, 0)
    };

    let isDragging = false;
    let previousMousePosition = { x: 0, y: 0 };
    let lastActiveTime = performance.now();
    const idleTimeout = 3200; // Wait 3.2s on load

    let activeFactor = 0;
    let physicsTriggered = false;

    // --- MOUSE 3D PROJECTED POSITION FOR INTERACTION ---
    const raycaster = new THREE.Raycaster();
    const mouse2D = new THREE.Vector2();
    const planeZ = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0); // Z = 0 plane
    const mouse3D = new THREE.Vector3(9999, 9999, 9999); // Offscreen default

    function updateMouse3D(clientX, clientY) {
      mouse2D.x = (clientX / window.innerWidth) * 2 - 1;
      mouse2D.y = -(clientY / window.innerHeight) * 2 + 1;
      
      raycaster.setFromCamera(mouse2D, camera);
      raycaster.ray.intersectPlane(planeZ, mouse3D);
    }

    container.addEventListener('mousemove', (e) => {
      const now = performance.now();
      lastActiveTime = now;
      updateMouse3D(e.clientX, e.clientY);

      if (isDragging) {
        const deltaX = e.clientX - previousMousePosition.x;
        const deltaY = e.clientY - previousMousePosition.y;

        cameraState.theta -= deltaX * 0.005;
        cameraState.phi = Math.max(0.2, Math.min(Math.PI - 0.2, cameraState.phi - deltaY * 0.005));

        previousMousePosition = { x: e.clientX, y: e.clientY };
      } else {
        cameraState.targetLookAt.set(mouse2D.x * 0.7, mouse2D.y * 0.7, 0);
      }
    });

    container.addEventListener('mousedown', (e) => {
      isDragging = true;
      previousMousePosition = { x: e.clientX, y: e.clientY };
      lastActiveTime = performance.now();
    });

    window.addEventListener('mouseup', () => {
      isDragging = false;
    });

    // Mobile touch interaction mapping
    container.addEventListener('touchmove', (e) => {
      if (e.touches.length === 1) {
        const now = performance.now();
        lastActiveTime = now;
        updateMouse3D(e.touches[0].clientX, e.touches[0].clientY);

        if (isDragging) {
          const deltaX = e.touches[0].clientX - previousMousePosition.x;
          const deltaY = e.touches[0].clientY - previousMousePosition.y;

          cameraState.theta -= deltaX * 0.006;
          cameraState.phi = Math.max(0.2, Math.min(Math.PI - 0.2, cameraState.phi - deltaY * 0.006));

          previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }
      }
    });

    container.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        isDragging = true;
        previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        updateMouse3D(e.touches[0].clientX, e.touches[0].clientY);
        lastActiveTime = performance.now();
      }
    });

    window.addEventListener('touchend', () => {
      isDragging = false;
      mouse3D.set(9999, 9999, 9999); // reset position
    });

    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    // Animation Loop
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const delta = Math.min(clock.getDelta(), 0.035); 
      const elapsed = clock.getElapsedTime();
      const now = performance.now();

      // Camera Orbiting Auto Trigger
      if (!isDragging && (now - lastActiveTime > idleTimeout)) {
        activeFactor += (1.0 - activeFactor) * 0.025; // Smooth slow start
        cameraState.theta += 0.055 * delta; // Slower camera orbit speed (0.085 -> 0.055)
        
        const targetPhi = Math.PI / 2.2 + Math.sin(elapsed * 0.15) * 0.18; // Slower vertical wave
        cameraState.phi += (targetPhi - cameraState.phi) * 0.035;
        
        mouse3D.set(9999, 9999, 9999); // Offscreen when idle
      } else if (isDragging) {
        activeFactor += (1.0 - activeFactor) * 0.1;
      }

      // Smooth look-at parallax
      cameraState.lookAt.lerp(cameraState.targetLookAt, 0.05);

      // Camera positioning
      camera.position.x = cameraState.radius * Math.sin(cameraState.phi) * Math.sin(cameraState.theta);
      camera.position.z = cameraState.radius * Math.sin(cameraState.phi) * Math.cos(cameraState.theta);
      camera.position.y = cameraState.radius * Math.cos(cameraState.phi);
      camera.lookAt(cameraState.lookAt);

      // --- KINETIC FLOATING MOBILE SYSTEM ---
      // 1. Calculate candidate positions from spatial sway and mouse offset
      physicsObjects.forEach((obj, i) => {
        if (!obj.mouseOffset) obj.mouseOffset = new THREE.Vector3();
        
        // Spatial sway (low frequency, nearby objects move together)
        const freq = 0.35;
        const floatX = Math.sin(elapsed * 0.4 + obj.defaultPos.x * freq + obj.defaultPos.y * freq) * 0.15;
        const floatY = Math.cos(elapsed * 0.3 + obj.defaultPos.y * freq + obj.defaultPos.z * freq) * 0.15;
        const floatZ = Math.sin(elapsed * 0.5 + obj.defaultPos.z * freq + obj.defaultPos.x * freq) * 0.15;
        const floatOffset = new THREE.Vector3(floatX, floatY, floatZ).multiplyScalar(activeFactor);

        // Mouse repulsion
        let targetMouseOffset = new THREE.Vector3();
        if (mouse3D.x < 1000) {
          const pushDir = new THREE.Vector3().subVectors(obj.defaultPos, mouse3D);
          pushDir.z = 0; // repel in X/Y plane
          const dist = pushDir.length();
          const mouseInfluenceRadius = 5.0;
          if (dist < mouseInfluenceRadius && dist > 0.01) {
            const force = Math.pow((mouseInfluenceRadius - dist) / mouseInfluenceRadius, 2) * 0.45;
            targetMouseOffset.copy(pushDir.normalize()).multiplyScalar(force);
          }
        }
        
        // Smooth lerp mouse offset
        obj.mouseOffset.lerp(targetMouseOffset, 0.05);

        // Final candidate position
        obj.pos.copy(obj.defaultPos).add(floatOffset).add(obj.mouseOffset);
      });

      // 2. Resolve safety neighbor distance checks to guarantee zero clipping
      for (let iter = 0; iter < 2; iter++) {
        physicsObjects.forEach((objA) => {
          if (!objA.neighbors) return;
          objA.neighbors.forEach((neigh) => {
            const objB = physicsObjects[neigh.index];
            const dir = new THREE.Vector3().subVectors(objB.pos, objA.pos);
            const dist = dir.length();
            if (dist < neigh.minDist && dist > 0.001) {
              const overlap = neigh.minDist - dist;
              const push = dir.normalize().multiplyScalar(overlap * 0.5);
              objA.pos.sub(push);
              objB.pos.add(push);
            }
          });
        });
      }

      // 3. Update mesh positions and apply minor rotations
      physicsObjects.forEach((obj, i) => {
        obj.mesh.position.copy(obj.pos);

        // Oscillate rotation gently to avoid sweep clipping
        const rotAmp = obj.mesh.geometry.type === 'SphereGeometry' ? 0.15 : 0.03;
        obj.mesh.rotation.x = obj.defaultRot.x + Math.sin(elapsed * 0.25 + i) * rotAmp;
        obj.mesh.rotation.y = obj.defaultRot.y + Math.cos(elapsed * 0.20 + i) * rotAmp;
        obj.mesh.rotation.z = obj.defaultRot.z + Math.sin(elapsed * 0.30 + i) * rotAmp;
      });

      // Volumetric scale wave animations (always active, scaled by activeFactor)
      redPlane.scale.y = 1.0 + (Math.sin(elapsed * 0.9) * 0.16) * activeFactor;
      const sphereStretch = Math.sin(elapsed * 2.8) * 0.08 * activeFactor;
      blackSphere.scale.set(1 + sphereStretch, 1 - sphereStretch, 1 + sphereStretch);
      topRod1.scale.y = 1.0 + (Math.sin(elapsed * 1.6) * 0.2) * activeFactor;
      topRod2.scale.y = 1.0 + (Math.cos(elapsed * 1.3) * 0.2) * activeFactor;
      triangle.scale.setScalar(1.0 + (Math.sin(elapsed * 1.8) * 0.12) * activeFactor);

      renderer.render(scene, camera);
    }

    // --- INTERACTIVE TAGS & CARDS LOGIC ---
    function switchPage(src, title) {
      // 1. Try direct parent call (same-origin)
      try {
        if (window.parent && typeof window.parent.handleIframeRedirect === 'function') {
          window.parent.handleIframeRedirect(src, title);
          return;
        }
      } catch (e) {
        console.warn("Direct parent call failed, trying postMessage fallback:", e);
      }

      // 2. Try postMessage (cross-origin / file:// safe)
      try {
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'iframeRedirect', src: src, title: title }, '*');
          return;
        }
      } catch (e) {
        console.warn("postMessage fallback failed:", e);
      }

      // 3. Ultimate fallback (local location change in iframe)
      window.location.href = src;
    }

    const cardA = document.getElementById('painting-card-a');
    const cardB = document.getElementById('painting-card-b');

    window.toggleCard = function(cardType, forceState) {
      if (cardType === 'a') {
        const show = forceState !== undefined ? forceState : (cardA.style.display !== 'flex');
        if (show) {
          cardA.style.display = 'flex';
          cardB.style.display = 'none';
        } else {
          cardA.style.display = 'none';
        }
      } else if (cardType === 'b') {
        const show = forceState !== undefined ? forceState : (cardB.style.display !== 'flex');
        if (show) {
          cardB.style.display = 'flex';
          cardA.style.display = 'none';
        } else {
          cardB.style.display = 'none';
        }
      }
    };

    document.querySelector('.tag-red').addEventListener('click', () => {
      switchPage('bauhaus_animation - A.html', '首頁動畫 A (靜態)');
    });

    document.querySelector('.tag-blue').addEventListener('click', () => {
      switchPage('bauhaus_animation - B.html', '首頁動畫 B (動態)');
    });

    document.querySelector('.tag-yellow').addEventListener('click', (e) => {
      e.stopPropagation();
      toggleCard('a');
    });

    document.querySelector('.tag-orange-diamond').addEventListener('click', (e) => {
      e.stopPropagation();
      toggleCard('b');
    });

    animate();
  </script>
</body>
</html>

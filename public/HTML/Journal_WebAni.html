<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journal_WebAni 動態展示</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="bauhaus-web3d.css">
  <script>
    function loadIframe(file) {
      document.getElementById("iframe").src = file;
    }
  </script>
</head>
<body>
  <main class="web3d-shell">
    <section class="web3d-frame is-compact">
      <div class="web3d-layout is-full">
        <aside class="web3d-side" aria-label="動態 Web3D 選單">
          <button class="is-red" type="button" onclick="loadIframe('web/ba64.3js_007AniE.html')">Base Ani</button>
          <button class="is-blue" type="button" onclick="loadIframe('web/glb.3js_007AniE.html')">GLB Ani</button>
          <button class="is-yellow" type="button" onclick="loadIframe('web/glb.MV_007AniE_claude.html')">ModelV Ani</button>
          <button class="is-red" type="button" onclick="loadIframe('web/glb.Gpu_007AniE.html')">GPU Ani</button>
          <button class="is-blue" type="button" onclick="loadIframe('web/Claude_optimized_aligned.html')">4D 動態</button>
        </aside>
        <section class="web3d-viewer">
          <iframe id="iframe" src="web/glb.3js_007AniE.html" title="Animated Web3D viewer"></iframe>
        </section>
      </div>
    </section>
  </main>
</body>
</html>
